<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Golf Scorecard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e5128 0%, #2d6a4f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            padding: 20px;
        }
        
        .scorecard {
            background: #faf9f6;
            border: 3px solid #2d4a2b;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px double #2d4a2b;
            padding-bottom: 20px;
        }
        
        .header h1 {
            font-size: 2.5em;
            color: #1e5128;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .header .subtitle {
            font-size: 1.1em;
            color: #52796f;
            font-style: italic;
        }
        
        .date {
            text-align: center;
            font-size: 1.1em;
            color: #2d4a2b;
            margin-bottom: 25px;
            font-weight: bold;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        th {
            background: linear-gradient(to bottom, #2d6a4f, #1e5128);
            color: #faf9f6;
            padding: 15px 10px;
            text-align: center;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #2d4a2b;
        }
        
        td {
            padding: 18px 10px;
            text-align: center;
            border: 2px solid #d3d3d3;
            font-size: 1.1em;
        }
        
        .player-name {
            font-weight: bold;
            text-align: left;
            padding-left: 20px;
            color: #1e5128;
            font-size: 1.2em;
        }
        
        tr:nth-child(even) {
            background-color: #f5f5f0;
        }
        
        tr:nth-child(odd) {
            background-color: #ffffff;
        }
        
        .score-par {
            color: #2d4a2b;
            font-weight: bold;
        }
        
        .score-bogey {
            color: #c1666b;
            font-weight: bold;
        }
        
        .score-birdie {
            color: #1e5128;
            font-weight: bold;
        }
        
        .total-positive {
            color: #c1666b;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .total-zero {
            color: #2d4a2b;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .total-negative {
            color: #1e5128;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .hole-info {
            text-align: center;
            background: #e8f3e8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #2d6a4f;
        }
        
        .hole-info h2 {
            color: #1e5128;
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        
        .commentary {
            text-align: center;
            font-style: italic;
            color: #52796f;
            margin-top: 20px;
            padding: 15px;
            background: #f0f5f0;
            border-radius: 8px;
            border-left: 4px solid #2d6a4f;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #52796f;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="scorecard">
        <div class="header">
            <h1>🏌️ Wordle Golf 🏌️</h1>
            <div class="subtitle">18-Hole Tournament</div>
        </div>
        
        <div class="date">📅 Round 1 • March 24, 2026</div>
        
        <div class="hole-info">
            <h2>⛳ Hole 1 of 18</h2>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="text-align: left; padding-left: 20px;">Player</th>
                    <th>Attempts</th>
                    <th>Score</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="player-name">Gazuty</td>
                    <td>5</td>
                    <td class="score-bogey">+1 (Bogey)</td>
                    <td class="total-positive">+1</td>
                </tr>
                <tr>
                    <td class="player-name">Ewan</td>
                    <td>4</td>
                    <td class="score-par">0 (Par)</td>
                    <td class="total-zero">E</td>
                </tr>
                <tr>
                    <td class="player-name">AB</td>
                    <td>4</td>
                    <td class="score-par">0 (Par)</td>
                    <td class="total-zero">E</td>
                </tr>
                <tr>
                    <td class="player-name">CL</td>
                    <td>5</td>
                    <td class="score-bogey">+1 (Bogey)</td>
                    <td class="total-positive">+1</td>
                </tr>
            </tbody>
        </table>
        
        <div class="commentary">
            💬 "Solid round. Ewan leads the way."
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background: #1e5128;"></div>
                <span>Birdie (-1)</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #2d4a2b;"></div>
                <span>Par (0)</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #c1666b;"></div>
                <span>Bogey (+1)</span>
            </div>
        </div>
    </div>
</body>
</html>
